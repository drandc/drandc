<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SQL Practice Generator{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/dracula.min.css">
    {% block extra_css %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
    <nav class="navbar">
        <div class="nav-brand">
            <a href="/">SQL Practice Generator</a>
        </div>
        <div class="nav-links">
            <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">Dashboard</a>
            <a href="/skills" class="nav-link {% if request.path == '/skills' %}active{% endif %}">Skills</a>
            <a href="/exercise" class="nav-link {% if request.path == '/exercise' %}active{% endif %}">Practice</a>
            <a href="/playground" class="nav-link {% if request.path == '/playground' %}active{% endif %}">Playground</a>
            <a href="/stats" class="nav-link {% if request.path == '/stats' %}active{% endif %}">Stats</a>
            <a href="/settings" class="nav-link {% if request.path == '/settings' %}active{% endif %}">Settings</a>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>SQL Practice Generator - Master SQL through practice</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/sql/sql.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
